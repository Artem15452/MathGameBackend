<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Таблиця результатів</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .stats-container { display: flex; gap: 20px; margin-bottom: 30px; }
        .card {
            flex: 1;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card.correct { background-color: #d4edda; border-color: #c3e6cb; color: #155724; }
        .card.wrong { background-color: #f8d7da; border-color: #f5c6cb; color: #721c24; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #f2f2f2; }
        .hidden { display: none; }
        .nav-link { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #007bff; }
        .clickable { cursor: pointer; color: #007bff; text-decoration: underline; }
        .clickable:hover { color: #0056b3; }
    </style>
</head>
<body>

<a href="/index.html" class="nav-link">← На головну</a>

<div id="mainSection">
    <h2>Статистика користувачів</h2>

    <table>
        <thead>
        <tr>
            <th>№</th>
            <th>Email</th>
            <th>Вгадано</th>
            <th>Помилки</th>
        </tr>
        </thead>
        <tbody id="usersTableBody">
        </tbody>
    </table>
</div>

<div id="detailsSection" class="hidden">
    <button id="backButton" style="margin-bottom: 10px; padding: 8px 16px; cursor: pointer;">← Назад</button>
    <h3 id="detailsTitle"></h3>
    <table>
        <thead>
        <tr>
            <th>№</th>
            <th>Вираз</th>
            <th>Відповідь</th>
            <th>Результат</th>
        </tr>
        </thead>
        <tbody id="detailsBody">
        </tbody>
    </table>
</div>

<script src="/js/renderTableResult.js"></script>
</body>
</html>
